name: Homework CI Pipeline

on:
  push:
    branches: [main]

jobs:
  check-and-test:
    runs-on: ubuntu-latest

    # CRITICAL: This grants the necessary permissions to publish the test results
    permissions:
      contents: read
      issues: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Prettier check
        run: npm run format:check

      # Install the Jest JUnit reporter and run tests to output the XML
      - name: Run Tests
        run: npx vitest run --reporter=default --reporter=junit --outputFile=junit.xml

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: ${{ always() && env.ACT != 'true' }}
        with:
          files: '**/junit.xml'
